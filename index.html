<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>D&D Character</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1 id="name">Loading...</h1>
    <p id="class">-</p>
    <p id="level">-</p>

  <div class="hp-panel">

    <div class="hp-actions">
      <button class="heal-btn" onclick="adjustHP(true)">
        HEAL
      </button>

      <input id="hpAmount" type="number">

      <button class="damage-btn" onclick="adjustHP(false)">
        DAMAGE
      </button>
    </div>

    <div class="hp-display">
      <div>
        <div class="hp-label">CURRENT</div>

        <div class="hp-current" id="currentHp"></div>
      </div>
      <div><div class="hp-slash">/</div></div>
      <div>
        <div class="hp-label">MAX</div>

        <div class="hp-max" id="maxHp"></div>
      </div>

      <div class="hp-title">
        HIT POINTS
      </div>

    </div>

  </div>

  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
