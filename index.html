<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>D&D Character</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1 id="name">Loading...</h1>
    <p id="class">-</p>
    <p id="level">-</p>

  <div class="hp-box">

    <h2>HP</h2>

    <input id="hpInput" type="number">

    <div class="btn-row">
      <button onclick="changeHP(-1)">-1</button>
      <button onclick="changeHP(+1)">+1</button>
    </div>

    <p id="hpDisplay"></p>

  </div>

  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
